name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Install dependencies
        run: brew install xcodegen cmake zstd

      - name: Build libxisf
        run: make deps

      - name: Generate Xcode project
        run: make project

      - name: Build app
        run: |
          DEVELOPER_DIR=/Applications/Xcode_16.app/Contents/Developer \
          xcodebuild \
            -project XISFQuickLook.xcodeproj \
            -scheme XISFQuickLook \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Ad-hoc sign extensions and app
        run: |
          APP=build/DerivedData/Build/Products/Release/XISFQuickLook.app
          for ext in "$APP/Contents/PlugIns/"*.appex; do
            codesign --force --deep --sign - "$ext"
          done
          codesign --force --deep --sign - "$APP"

      - name: Create DMG
        run: |
          APP=build/DerivedData/Build/Products/Release/XISFQuickLook.app
          VERSION=${GITHUB_REF_NAME:-dev}
          DMG_NAME="XISFQuickLook-${VERSION}.dmg"

          STAGING=$(mktemp -d)
          cp -R "$APP" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -volname "XISFQuickLook" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG_NAME"

          rm -rf "$STAGING"
          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Upload DMG as artifact
        uses: actions/upload-artifact@v4
        with:
          name: XISFQuickLook-dmg
          path: "*.dmg"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.dmg"
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
